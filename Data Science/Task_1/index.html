<!DOCTYPE html>
<html>
<head>

<title>Titanic Survival Prediction</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

.container{

margin:auto;
margin-top:30px;
width:400px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px gray;

}

input,select{

width:90%;
padding:10px;
margin:8px;

}

button{

padding:10px;
background:green;
color:white;
border:none;
width:95%;

}

</style>

</head>

<body>

<div class="container">

<h2>Titanic Survival Prediction</h2>

<form action="/predict" method="post">

<input type="number" name="Pclass" placeholder="Passenger Class" required>

<select name="Sex">

<option value="1">Male</option>

<option value="0">Female</option>

</select>

<input type="number" step="0.1" name="Age" placeholder="Age" required>

<input type="number" name="SibSp" placeholder="Siblings/Spouse">

<input type="number" name="Parch" placeholder="Parents/Children">

<input type="number" step="0.1" name="Fare" placeholder="Fare">

<select name="Embarked">

<option value="2">Southampton</option>

<option value="0">Cherbourg</option>

<option value="1">Queenstown</option>

</select>

<button type="submit">Predict</button>

</form>

<h2>{{ prediction }}</h2>

</div>

</body>

</html>
